name: Premium server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/quiet", "/norestart" -Wait

      - name: Connect to Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey "${{ secrets.TAILSCALE_AUTHKEY }}" --accept-routes

      - name: Create user
        shell: powershell
        run: |
          $User = "ServerPremium"
          $Pass = "ServerPre@123"

          net user $User $Pass /add
          net localgroup administrators $User /add
          net localgroup "Remote Desktop Users" $User /add

      - name: Show IP and credentials
        shell: powershell
        run: |
          Write-Host "------------------------------------------"
          $tsIP = (Get-NetIPAddress -InterfaceAlias 'Tailscale' -AddressFamily IPv4 | Select-Object -First 1).IPAddress
          Write-Host "IP: $tsIP"
          Write-Host "User: ServerPremium"
          Write-Host "Pass: ServerPre@123"
          Write-Host "------------------------------------------"

      - name: Keep alive
        shell: powershell
        run: |
          $seconds = 21600
          for ($i = 0; $i -lt $seconds; $i += 10) {
            Write-Host "Running... $i / $seconds seconds"
            Start-Sleep -Seconds 10
          }
